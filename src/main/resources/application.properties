server.port=8080

# ══════════════════════════════════════════════════════
# BANCO DE DADOS
# ══════════════════════════════════════════════════════
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stgian_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Recife&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sua_senha_aqui}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ══════════════════════════════════════════════════════
# JWT
# ══════════════════════════════════════════════════════
stgian.jwt.secret=${STGIAN_JWT_SECRET:EPJAT6DImXtOpKrMVQntPl7Nyy0Swo6/HiRxrr6hRy4=}
stgian.jwt.expiration=28800000

# ══════════════════════════════════════════════════════
# CORS — aceita o domínio real + localhost para dev
# ══════════════════════════════════════════════════════
stgian.cors.allowed-origins=${STGIAN_CORS_ALLOWED_ORIGINS:https://stgian.com.br,https://www.stgian.com.br,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ══════════════════════════════════════════════════════
# MERCADO PAGO
# ══════════════════════════════════════════════════════
mercadopago.access-token=${MP_TOKEN:APP_USR-SEU-TOKEN-AQUI}
mercadopago.public-key=${MP_PUBKEY:APP_USR-SUA-PUBKEY-AQUI}
stgian.mp-seller-email=${MP_SELLER_EMAIL:ajogador42@gmail.com}

# ══════════════════════════════════════════════════════
# URLs — usadas para webhook e back_urls do MP
# ══════════════════════════════════════════════════════
stgian.base-url=${STGIAN_BASE_URL:https://stgian-backend-production.up.railway.app}
stgian.frontend-url=${STGIAN_FRONTEND_URL:https://stgian.com.br}

# ══════════════════════════════════════════════════════
# SEGURANÇA
# ══════════════════════════════════════════════════════
spring.main.banner-mode=off
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# ══════════════════════════════════════════════════════
# PERFORMANCE
# ══════════════════════════════════════════════════════
# Compressão GZIP — reduz tamanho das respostas em até 70%
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024

# Connection pool otimizado para Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
