server.port=8080

# ══════════════════════════════════════════════════════
# CREDENCIAIS — use variáveis de ambiente em produção
# Exemplo de como rodar: MP_TOKEN=xxx DB_PASS=yyy mvn spring-boot:run
# OU defina no sistema operacional/servidor antes de subir
# ══════════════════════════════════════════════════════

# Banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/stgian_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Recife&allowPublicKeyRetrieval=true
spring.datasource.username=root
# FIX-CRITICO-5: Senha via variável de ambiente (export DB_PASS=suasenha)
# Para desenvolvimento local, pode colocar a senha direto aqui
spring.datasource.password=${DB_PASS:sua_senha_aqui}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
stgian.jwt.secret=EPJAT6DImXtOpKrMVQntPl7Nyy0Swo6/HiRxrr6hRy4=
stgian.jwt.expiration=28800000

# CORS
stgian.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Mercado Pago — FIX-CRITICO-5: tokens via variável de ambiente
# Para desenvolvimento: export MP_TOKEN=TEST-... MP_PUBKEY=TEST-...
# Para produção: use APP_USR-... (tokens de produção)
mercadopago.access-token=${MP_TOKEN:TEST-SEU-TOKEN-AQUI}
mercadopago.public-key=${MP_PUBKEY:TEST-SUA-PUBKEY-AQUI}
stgian.mp-seller-email=${MP_SELLER_EMAIL:}

# URLs
stgian.base-url=http://localhost:8080
stgian.frontend-url=http://127.0.0.1:5500

# Segurança
spring.main.banner-mode=off
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
